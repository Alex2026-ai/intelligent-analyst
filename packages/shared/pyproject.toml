[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ia-shared"
version = "1.0.0"
description = "Shared type definitions and contracts for Intelligent Analyst"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0,<3.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/ia_shared"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.mypy]
strict = true
plugins = ["pydantic.mypy"]

[tool.ruff]
line-length = 100
