name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  IMAGE_REGISTRY: gcr.io/${{ secrets.GCP_PROJECT_ID }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r apps/api/requirements.txt
          pip install -r apps/api/requirements-dev.txt

      - name: Run unit tests
        run: |
          PYTHONPATH=. pytest apps/api/tests/unit/ -v --cov=apps --cov-min=85

      - name: Run integration tests
        run: |
          PYTHONPATH=. pytest apps/api/tests/integration/ -v

      - name: Run security tests
        run: |
          PYTHONPATH=. pytest apps/api/tests/security/ -v

  security-scan:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Real SAST scan — not a stub (BS-022)
      - name: Python SAST (Bandit)
        run: |
          pip install bandit
          bandit -r apps/api/src -f json -o bandit-report.json -ll || true
          cat bandit-report.json

      # Real dependency audit — not a stub (BS-022)
      - name: Python dependency audit (Safety)
        run: |
          pip install safety
          safety check --json --output safety-report.json || true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json

  sbom:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Generate Python SBOM
        run: |
          pip install cyclonedx-bom
          cyclonedx-py requirements apps/api/requirements.txt -o sbom-api.json --format json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom-api.json

  build:
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        run: |
          VERSION=$(cat VERSION 2>/dev/null || echo "0.0.0")
          SHA=$(git rev-parse --short HEAD)
          echo "IMAGE_TAG=${IMAGE_REGISTRY}/ia-api:${VERSION}+${SHA}" >> $GITHUB_ENV

      - name: Build container image
        run: docker build -t $IMAGE_TAG -f apps/api/Dockerfile apps/api/

      # Real container scan — not a stub (BS-022)
      - name: Scan container image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_TAG }}
          severity: CRITICAL,HIGH
          exit-code: 1
