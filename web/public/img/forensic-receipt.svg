<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <!-- Background -->
  <rect width="800" height="400" fill="#0f172a"/>

  <!-- Left panel - JSON -->
  <rect x="20" y="20" width="370" height="360" rx="4" fill="#1e293b"/>
  <text x="36" y="48" font-family="monospace" font-size="11" fill="#64748b">// Evidence Blob</text>

  <g transform="translate(36, 70)" font-family="monospace" font-size="11">
    <text y="0" fill="#c084fc">{</text>
    <text y="20" fill="#94a3b8">  "trace_id": </text><text x="100" y="20" fill="#fbbf24">"BATCH-A7F2E9C1"</text><text x="260" y="20" fill="#94a3b8">,</text>
    <text y="40" fill="#94a3b8">  "timestamp": </text><text x="110" y="40" fill="#fbbf24">"2026-02-17T14:32:18Z"</text><text x="290" y="40" fill="#94a3b8">,</text>
    <text y="60" fill="#94a3b8">  "resolution_layer": </text><text x="150" y="60" fill="#fbbf24">"L1_DETERMINISTIC"</text><text x="300" y="60" fill="#94a3b8">,</text>
    <text y="80" fill="#94a3b8">  "canonical_match": </text><text x="140" y="80" fill="#fbbf24">"APPLE INC"</text><text x="238" y="80" fill="#94a3b8">,</text>
    <text y="100" fill="#94a3b8">  "confidence": </text><text x="115" y="100" fill="#a78bfa">1.0</text><text x="138" y="100" fill="#94a3b8">,</text>
    <text y="120" fill="#94a3b8">  "signature_valid": </text><text x="145" y="120" fill="#34d399">true</text><text x="175" y="120" fill="#94a3b8">,</text>
    <text y="140" fill="#94a3b8">  "hash_chain": </text><text x="108" y="140" fill="#fbbf24">"sha256:9f8e7d..."</text><text x="260" y="140" fill="#94a3b8">,</text>
    <text y="160" fill="#94a3b8">  "anchor_status": </text><text x="130" y="160" fill="#fbbf24">"CONFIRMED"</text><text x="238" y="160" fill="#94a3b8">,</text>
    <text y="180" fill="#94a3b8">  "retention_years": </text><text x="148" y="180" fill="#a78bfa">7</text>
    <text y="200" fill="#c084fc">}</text>
  </g>

  <!-- Right panel - PDF preview -->
  <rect x="410" y="20" width="370" height="360" rx="4" fill="#f8fafc"/>

  <!-- PDF header -->
  <rect x="430" y="40" width="330" height="60" fill="#0f172a"/>
  <text x="450" y="70" font-family="system-ui" font-size="14" fill="#fff" font-weight="bold">FORENSIC EVIDENCE CERTIFICATE</text>
  <text x="450" y="88" font-family="monospace" font-size="10" fill="#64748b">Intelligent Analyst Enterprise</text>

  <!-- PDF body -->
  <text x="430" y="130" font-family="system-ui" font-size="11" fill="#1e293b" font-weight="600">Batch Details</text>
  <rect x="430" y="140" width="330" height="1" fill="#e2e8f0"/>

  <text x="430" y="162" font-family="system-ui" font-size="10" fill="#64748b">Trace ID</text>
  <text x="560" y="162" font-family="monospace" font-size="10" fill="#1e293b">BATCH-A7F2E9C1</text>

  <text x="430" y="182" font-family="system-ui" font-size="10" fill="#64748b">Records Processed</text>
  <text x="560" y="182" font-family="monospace" font-size="10" fill="#1e293b">47,832</text>

  <text x="430" y="202" font-family="system-ui" font-size="10" fill="#64748b">Processing Date</text>
  <text x="560" y="202" font-family="monospace" font-size="10" fill="#1e293b">2026-02-17</text>

  <text x="430" y="240" font-family="system-ui" font-size="11" fill="#1e293b" font-weight="600">Cryptographic Attestation</text>
  <rect x="430" y="250" width="330" height="1" fill="#e2e8f0"/>

  <!-- Signature block -->
  <rect x="430" y="265" width="330" height="90" rx="4" fill="#f1f5f9"/>

  <text x="450" y="288" font-family="system-ui" font-size="10" fill="#64748b">Digital Signature</text>
  <text x="450" y="305" font-family="monospace" font-size="9" fill="#1e293b">ECDSA P-256 / Cloud KMS</text>

  <text x="450" y="328" font-family="system-ui" font-size="10" fill="#64748b">Hash Chain</text>
  <text x="450" y="345" font-family="monospace" font-size="9" fill="#1e293b">sha256:9f8e7d6c5b4a3f2e1d0c...</text>

  <!-- Verified stamp -->
  <g transform="translate(680, 280)">
    <circle r="30" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text y="5" font-family="system-ui" font-size="10" fill="#16a34a" text-anchor="middle" font-weight="bold">VERIFIED</text>
  </g>
</svg>
